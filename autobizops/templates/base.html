<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>AutoBizOps</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts: Roboto & Orbitron -->
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&family=Orbitron:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.datatables.net/2.3.3/css/dataTables.dataTables.css" />

  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script src="https://cdn.datatables.net/2.3.3/js/dataTables.js"></script>
    <link rel= "stylesheet" type= "text/css" href= "{{ url_for('static',filename='custom_styles.css') }}">
</head>
<body>
<nav class="navbar navbar-expand-lg shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="{{url_for('core.index')}}">AutoBizOps</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
            data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup"
            aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse justify-content-between" id="navbarNavAltMarkup">
      <div class="navbar-nav mx-auto">
        <a class="nav-link {% if request.endpoint == 'core.about' %}active{% endif %}" href="{{url_for('core.about')}}">About</a>
        <a class="nav-link" href="#">Blog</a>
        <a class="nav-link {% if request.endpoint == 'core.pricing' %}active{% endif %}" href="{{url_for('core.pricing')}}">Pricing</a>
      </div>
      <div class="navbar-nav">
        {% if current_user.is_authenticated %}
          <a class="nav-link" href="{{url_for('users.account')}}">My Profile</a>
          <a class="nav-link" href="{{url_for('core.pricing')}}">Credits: {{current_user.credits_balance}}</a>
          <a class="nav-link" href="{{url_for('users.logout')}}">Logout</a>
        {% else %}
          <a class="btn btn-outline-primary me-2" href="{{url_for('users.login')}}">Login</a>
          <a class="btn btn-primary" href="{{url_for('users.register')}}">Sign-up</a>
        {% endif %}
      </div>
    </div>
  </div>
</nav>


{% block content %}{% endblock %}


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
